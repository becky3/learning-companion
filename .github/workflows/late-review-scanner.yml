# Late Review Scanner — Caller
#
# マージ済みPRの未解決レビュースレッドを定期スキャンし、集約Issueとして可視化。
# Reusable Workflow (shared-workflows) を呼び出す。
# 設計書: shared-workflows/docs/specs/late-review-scanner.md

name: Late Review Scanner

permissions:
  contents: read
  pull-requests: write
  issues: write

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  scan:
    uses: becky3/shared-workflows/.github/workflows/late-review-scanner.yml@main
    with:
      scan_hours: 24
    secrets: inherit
