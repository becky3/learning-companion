name: Late Review Scanner

permissions:
  contents: read
  pull-requests: write
  issues: write

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  scan:
    uses: becky3/shared-workflows/.github/workflows/late-review-scanner.yml@main
    with:
      scan_hours: 24
    secrets: inherit
